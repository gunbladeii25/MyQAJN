name: Deploy to GCP VM

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation (no static key)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: github-deploy@prestij-fisha-complaintagent.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Start IAP tunnel
        run: |
          nohup gcloud compute start-iap-tunnel myqajn-vm 22 \
            --local-host-port=localhost:2222 \
            --zone=asia-southeast1-b \
            --project=prestij-fisha-complaintagent \
            > tunnel.log 2>&1 &
          echo "Waiting for tunnel to accept connections on :2222..."
          for i in $(seq 1 30); do
            if (exec 3<>/dev/tcp/localhost/2222) 2>/dev/null; then
              exec 3<&- 3>&-
              echo "Tunnel is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Tunnel never came up — dumping log:"
          cat tunnel.log
          exit 1

      - name: Deploy over IAP tunnel
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCP_DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh -v -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=15 \
            -p 2222 ghdeploy@localhost '
              sudo git -C /opt/myqajn pull origin main &&
              sudo docker compose -f /opt/myqajn/docker-compose.yml build &&
              sudo docker compose -f /opt/myqajn/docker-compose.yml up -d
            '
