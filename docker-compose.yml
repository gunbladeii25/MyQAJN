services:
  postgres:
    image: postgres:16
    container_name: prestij25_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: G6_P23
      POSTGRES_USER: prestij_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prestij_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prestij_admin -d G6_P23"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: prestij25_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: prestij25_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Overrides pointing at container hostnames (docker-compose's internal
      # DNS) — takes precedence over the same keys in .env, which is written
      # for local (non-Docker) dev against localhost.
      DATABASE_URL: postgresql://prestij_admin:${POSTGRES_PASSWORD:-prestij_secret}@postgres:5432/G6_P23
      AI_ENGINE_URL: http://ai-engine:8010
      OLLAMA_URL: http://ollama:11434
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2:1b}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy

  ai-engine:
    build: ./ai-engine
    container_name: prestij25_ai_engine
    restart: unless-stopped
    env_file:
      - ./ai-engine/.env
    environment:
      OLLAMA_URL: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: prestij25_frontend
    restart: unless-stopped
    ports:
      # Only 80 — the GCP Load Balancer terminates TLS (Google-managed
      # cert on myqajn-https-proxy) and always talks plain HTTP to this
      # backend, for both http:// and https:// visitors.
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  ollama_data:
