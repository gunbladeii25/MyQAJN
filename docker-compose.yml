version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: prestij25_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: prestij25_db
      POSTGRES_USER: prestij_admin
      POSTGRES_PASSWORD: prestij_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prestij_admin -d prestij25_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
