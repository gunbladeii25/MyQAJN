server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API — proxied to the backend container (same Docker network)
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # LLM-backed endpoints (Myra chat, translate, briefs) can take
        # well over the 60s default on CPU-only Ollama inference.
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # SPA — client-side routing fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reasonable cache for hashed build assets
    location /assets/ {
        expires 7d;
        access_log off;
    }
}
