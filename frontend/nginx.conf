# Port 80 stays serving the app directly (not a redirect) — 136.68.86.198
# is a GCP HTTP Load Balancer forwarding rule, not the VM directly, and its
# health check hits "/" on port 80 expecting 200. A redirect here makes the
# LB mark the backend unhealthy and return 502 to everyone.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 7d;
        access_log off;
    }
}

# Port 443 — same app, over TLS. Only reachable once a GCP forwarding rule
# for 443 exists (the LB currently only has one for port 80); until then
# this just sits unused and harmless.
server {
    listen 443 ssl;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/136.68.86.198.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/136.68.86.198.nip.io/privkey.pem;

    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 7d;
        access_log off;
    }
}
