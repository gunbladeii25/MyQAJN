server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Let's Encrypt HTTP-01 challenge — webroot shared with the host via a
    # bind mount (see docker-compose.yml) so certbot can complete issuance/
    # renewal without ever stopping this container.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # API — proxied to the backend container (same Docker network)
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # LLM-backed endpoints (Myra chat, translate, briefs) can take
        # well over the 60s default on CPU-only Ollama inference.
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        # Dashboard live-updates (reports/dashboard/stream) are Server-Sent
        # Events — without this nginx buffers the whole response and events
        # never reach the browser until the connection closes.
        proxy_buffering off;
    }

    # SPA — client-side routing fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reasonable cache for hashed build assets
    location /assets/ {
        expires 7d;
        access_log off;
    }
}
