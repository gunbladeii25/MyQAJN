# Port 80 — ACME challenge (renewals) + redirect everything else to HTTPS.
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Issued via certbot --webroot on the VM (see /opt/myqajn/certbot-webroot
    # + the acme-challenge location above); mounted read-only from the host
    # (docker-compose.yml) since it must persist across image rebuilds.
    ssl_certificate     /etc/letsencrypt/live/136.68.86.198.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/136.68.86.198.nip.io/privkey.pem;

    # API — proxied to the backend container (same Docker network)
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # LLM-backed endpoints (Myra chat, translate, briefs) can take
        # well over the 60s default on CPU-only Ollama inference.
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        # Dashboard live-updates (reports/dashboard/stream) are Server-Sent
        # Events — without this nginx buffers the whole response and events
        # never reach the browser until the connection closes.
        proxy_buffering off;
    }

    # SPA — client-side routing fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reasonable cache for hashed build assets
    location /assets/ {
        expires 7d;
        access_log off;
    }
}
